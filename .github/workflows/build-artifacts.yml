name: Build Spears Artifacts

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install zip utility
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Build all loader artifacts
        run: bash ./build_all_loaders.sh

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spears-1.21.8-artifacts
          path: dist/*
          if-no-files-found: error
